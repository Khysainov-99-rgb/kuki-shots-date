name: Collect Basketball Odds

on:
  schedule:
    - cron: '0 3 * * *'   # 06:00 МСК
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # <-- ЭТО ВАЖНО: даёт право на push

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python .github/scripts/collect_nba_odds.py

      - name: Commit and push
        run: |
          git config user.name "KUKI Bot"
          git config user.email "bot@kuki.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update odds $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
