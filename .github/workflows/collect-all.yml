name: Daily Basketball Odds

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run parser
        run: python .github/scripts/collect_all_odds.py

      - name: Show results
        run: cat data/all_odds.json
