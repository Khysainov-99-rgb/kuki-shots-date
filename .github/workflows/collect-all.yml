name: Daily Basketball Odds

on:
  schedule:
    - cron: '0 7 * * *'   # 10:00 МСК (07:00 UTC)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run parser
        run: python .github/scripts/collect_all_odds.py

      - name: Commit and push
        run: |
          git config user.name "KUKI Bot"
          git config user.email "bot@kuki.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update odds $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
